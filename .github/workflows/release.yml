name: release
on:
  push:
    tags: ['v*']
permissions:
  id-token: write     # OIDC Trusted Publishing + provenance
  contents: write     # GitHub Release
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Use latest npm (OIDC trusted publishing support)
        run: npm install -g npm@latest
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG package=$VER"
          test "$TAG" = "$VER" || { echo "tag/version mismatch"; exit 1; }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Publish to npm (one-time token; provenance)
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
